<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScriptDom</title>
</head>
<body>
    <div>Hello</div>
    <input id="fristname" name="frist" value="ทดสอบ">
    <div>
        <input type="checkbox" name="interest" value="หนังสือ">หนังสือ
        <input type="checkbox" name="interest" value="เกม">เกม
        <input type="checkbox" name="interest" value="กีฬา">กีฬา
    </div>

    <script>
        console.log('Hello');
        let fnDom=document.getElementById("fristname");
        console.log(fnDom.value);
        console.log(document.querySelector("#fristname").value);

        let checkboxInputs=document.querySelectorAll('input[name="interest"]');
        for (let i=0; i<checkboxInputs.length; i++){
            console.log(checkboxInputs[i].value);
        }
    </script>
</body>
</html>
